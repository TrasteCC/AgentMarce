version: '3.8'

# ============================================================
# Ollama - Local LLM with resource limits for CPU-only setup
# Dell Precision 3640 / i7-10700, no GPU
# ============================================================

services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama-cpu
    ports:
      # Only listen on localhost — do not expose to the network
      - "127.0.0.1:11434:11434"
    volumes:
      - ./models:/root/.ollama
    environment:
      # Process only 1 request at a time (avoids CPU saturation)
      - OLLAMA_NUM_PARALLEL=1
      # Only 1 model loaded in RAM at a time
      - OLLAMA_MAX_LOADED_MODELS=1
      # Unload the model from RAM after 5 minutes of inactivity
      - OLLAMA_KEEP_ALIVE=5m
      # Force CPU usage (do not search for a GPU)
      - OLLAMA_GPU_OVERHEAD=0
    deploy:
      resources:
        limits:
          # Maximum 4 threads from the i7-10700
          cpus: '4'
          # Maximum 3 GB RAM (1.5B model uses ~1.1 GB)
          memory: 3G
        reservations:
          memory: 512M
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
