version: '3.8'

# ============================================================
# Ollama - LLM Local con limites de recursos para CPU-only
# Dell Precision 3640 / i7-10700 sin GPU
# ============================================================

services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama-cpu
    ports:
      # Solo escucha en localhost, no exponer al exterior
      - "127.0.0.1:11434:11434"
    volumes:
      - ./models:/root/.ollama
    environment:
      # Solo 1 request en paralelo (evita saturar CPU)
      - OLLAMA_NUM_PARALLEL=1
      # Solo 1 modelo cargado en RAM a la vez
      - OLLAMA_MAX_LOADED_MODELS=1
      # Descarga el modelo de RAM si inactivo 5 minutos
      - OLLAMA_KEEP_ALIVE=5m
      # Forzar uso de CPU (no busca GPU)
      - OLLAMA_GPU_OVERHEAD=0
    deploy:
      resources:
        limits:
          # Maximo 4 threads del i7-10700
          cpus: '4'
          # Maximo 3 GB RAM (modelo 1.5B usa ~1.1 GB)
          memory: 3G
        reservations:
          memory: 512M
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
